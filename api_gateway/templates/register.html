<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'books' %}">Bookstore</a>
            <div class="navbar-nav ms-auto">
                {% if user_name %}
                    <span class="navbar-text me-3">Xin chào, {{ user_name }}!</span>
                    <a class="nav-link" href="{% url 'logout' %}">Đăng xuất</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Đăng nhập</a>
                    <a class="nav-link" href="{% url 'register' %}">Đăng ký</a>
                {% endif %}
                {% if user_id %}
                <a class="nav-link" href="{% url 'view_cart' user_id %}">Giỏ hàng</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Đăng ký khách hàng</h2>
                <form method="post" class="card p-4">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên:</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu:</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
                </form>
                {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
