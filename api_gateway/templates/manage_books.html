<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'books' %}">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center mb-4">Quản lý sách</h1>
        <div class="text-center mb-4">
            <a href="{% url 'add_book' %}" class="btn btn-success">Thêm sách mới</a>
        </div>
        <div class="row">
            {% for book in books %}
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ book.title }}</h5>
                        <p class="card-text">Tác giả: {{ book.author }}</p>
                        <p class="card-text">Giá: {{ book.price }} VND</p>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'edit_book' book.id %}" class="btn btn-warning">Sửa</a>
                            <a href="{% url 'delete_book' book.id %}" class="btn btn-danger" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <p class="text-center">Không có sách nào.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
