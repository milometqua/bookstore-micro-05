<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'books' %}">Bookstore</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Sửa sách</h2>
                <form method="post" class="card p-4">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Tiêu đề:</label>
                        <input type="text" id="title" name="title" value="{{ book.title }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Tác giả:</label>
                        <input type="text" id="author" name="author" value="{{ book.author }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Giá:</label>
                        <input type="number" id="price" step="0.01" name="price" value="{{ book.price }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả:</label>
                        <textarea id="description" name="description" class="form-control" rows="4">{{ book.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="stock" class="form-label">Số lượng tồn kho:</label>
                        <input type="number" id="stock" name="stock" value="{{ book.stock }}" class="form-control" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Cập nhật sách</button>
                </form>
                {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
